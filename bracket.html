<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goldi Bot · Bracket</title>
<style>
:root {
  --bg:#0b0e14; --surface:#13171f; --card:#181d28; --card2:#1e2433;
  --border:#252d3d; --border2:#2e3a50; --text:#dde4f0; --muted:#6b7a96;
  --accent:#4f7ef0; --accent2:#3563d4;
  --gold:#f0b429; --gold-bg:#1e1a08;
  --green:#34d058; --green-bg:#0a1f10; --green-dim:rgba(52,208,88,.12);
  --red:#f04f4f; --red-bg:#1f0a0a;
  --amber:#e09a20; --amber-bg:#1e1508;
  --purple:#9f6ef0;
  --win-line:#3563d4; --lose-line:#6b3a9e;
  --r:7px; --tr:.2s cubic-bezier(.4,0,.2,1);
  --sb:272px; --hdr:52px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:13px;overflow:hidden;}
a{color:var(--accent);text-decoration:none;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* HEADER */
.hdr{
  position:fixed;top:0;left:0;right:0;height:var(--hdr);
  background:rgba(11,14,20,.95);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;padding:0 14px;z-index:200;
}
.hdr-logo{width:30px;height:30px;border-radius:6px;flex-shrink:0;
  background:linear-gradient(135deg,#f0b429,#e06010);
  display:flex;align-items:center;justify-content:center;font-size:15px;}
.hdr-info{flex:1;min-width:0;}
.hdr-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.hdr-back{font-size:11px;color:var(--muted);padding:4px 9px;border-radius:5px;
  border:1px solid var(--border);transition:all var(--tr);white-space:nowrap;flex-shrink:0;}
.hdr-back:hover{color:var(--text);border-color:var(--border2);}
.sb-btn{width:30px;height:30px;border-radius:5px;border:1px solid var(--border);
  background:none;color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;transition:all var(--tr);}
.sb-btn:hover{color:var(--text);border-color:var(--border2);background:var(--card);}

/* LAYOUT */
.layout{display:flex;height:100vh;padding-top:var(--hdr);}

/* SIDEBAR */
.sidebar{
  width:var(--sb);min-width:var(--sb);
  background:var(--surface);border-right:1px solid var(--border);
  overflow-y:auto;overflow-x:hidden;
  transition:width var(--tr),min-width var(--tr),opacity var(--tr);
  display:flex;flex-direction:column;flex-shrink:0;
}
.sidebar.hidden{width:0;min-width:0;opacity:0;pointer-events:none;}

.sb-sec{padding:14px 12px 10px;border-bottom:1px solid var(--border);}
.sb-sec:last-child{border-bottom:none;flex:1;}
.sb-lbl{font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.09em;color:var(--muted);margin-bottom:10px;}

/* info rows */
.info-rows{display:flex;flex-direction:column;gap:5px;}
.info-row{display:flex;justify-content:space-between;align-items:center;
  padding:5px 8px;background:var(--card);border-radius:5px;font-size:12px;}
.info-row .ik{color:var(--muted);}
.info-row .iv{font-weight:600;text-align:right;}
.iv.green{color:var(--green);}
.iv.amber{color:var(--amber);}
.iv.gold{color:var(--gold);}
.iv.accent{color:var(--accent);}

/* progress bar */
.prog-wrap{margin-top:10px;}
.prog-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));
  border-radius:2px;transition:width .6s ease;}
.prog-label{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);}

/* player list */
.p-list{display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.p-row{display:flex;align-items:center;gap:7px;
  padding:5px 7px;border-radius:5px;font-size:11px;cursor:default;
  transition:background var(--tr);}
.p-row.alive{background:var(--card);}
.p-row.alive:hover{background:var(--card2);}
.p-row.elim{opacity:.28;}
.p-row.champ{background:var(--gold-bg);border:1px solid rgba(240,180,41,.2);}
.p-seed{width:16px;height:16px;border-radius:50%;background:var(--border);
  font-size:9px;color:var(--muted);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.p-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.p-tag{font-size:9px;flex-shrink:0;padding:1px 4px;border-radius:4px;}
.p-tag.w{background:rgba(79,126,240,.15);color:var(--accent);}
.p-tag.l{background:rgba(159,110,240,.15);color:var(--purple);}
.p-tag.out{color:var(--red);font-size:10px;}
.p-tag.champ{color:var(--gold);font-size:11px;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* TOOLBAR */
.toolbar{
  background:rgba(11,14,20,.9);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  padding:8px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  flex-shrink:0;
}
.tabs{display:flex;gap:2px;background:var(--card);
  padding:3px;border-radius:6px;border:1px solid var(--border);}
.tab{padding:4px 13px;border-radius:4px;font-size:11px;font-weight:600;
  cursor:pointer;border:none;background:none;color:var(--muted);
  font-family:inherit;transition:all var(--tr);letter-spacing:.02em;}
.tab.active{background:var(--accent);color:#fff;}
.tab.active.loser{background:var(--purple);}
.tab:hover:not(.active){color:var(--text);}

.view-toggle{display:flex;gap:2px;background:var(--card);
  padding:3px;border-radius:6px;border:1px solid var(--border);}
.vtab{padding:4px 10px;border-radius:4px;font-size:10px;font-weight:600;
  cursor:pointer;border:none;background:none;color:var(--muted);
  font-family:inherit;transition:all var(--tr);}
.vtab.active{background:var(--card2);color:var(--text);border:1px solid var(--border2);}

.live-pill{display:flex;align-items:center;gap:5px;
  margin-left:auto;font-size:10px;color:var(--muted);}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);
  animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.share-btn{background:none;border:1px solid var(--border);color:var(--muted);
  border-radius:5px;padding:3px 9px;font-size:10px;cursor:pointer;
  font-family:inherit;transition:all var(--tr);}
.share-btn:hover{color:var(--text);border-color:var(--border2);}

/* CHAMPION */
.champ-banner{
  margin:16px 16px 0;padding:14px 18px;
  background:linear-gradient(135deg,rgba(240,180,41,.07),rgba(240,180,41,.02));
  border:1px solid rgba(240,180,41,.25);border-radius:10px;
  display:flex;align-items:center;gap:14px;
  animation:fadeUp .4s ease both;flex-shrink:0;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.champ-crown{font-size:28px;}
.champ-lbl{font-size:9px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.1em;}
.champ-name{font-size:18px;font-weight:700;margin-top:2px;}

/* BRACKET CANVAS */
.bracket-canvas{flex:1;overflow:auto;padding:20px 20px 48px;}

/* BRACKET TREE — Challonge layout */
.b-stage{display:flex;align-items:flex-start;gap:0;min-width:max-content;position:relative;}

.b-round{display:flex;flex-direction:column;position:relative;}
.b-round-lbl{
  font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.09em;color:var(--muted);
  text-align:center;padding-bottom:10px;
  white-space:nowrap;
}

.b-slots{display:flex;flex-direction:column;}
.b-slot{display:flex;align-items:center;position:relative;}

/* MATCH CARD — Challonge style */
.mc{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;width:200px;flex-shrink:0;
  transition:border-color var(--tr),box-shadow var(--tr);
  animation:cardPop .25s ease both;
}
@keyframes cardPop{from{opacity:0;scale:.97;}to{opacity:1;scale:1;}}
.mc:hover{border-color:var(--border2);box-shadow:0 3px 20px rgba(0,0,0,.4);}
.mc.live{border-color:rgba(79,126,240,.4);}
.mc.done{border-color:rgba(52,208,88,.18);}
.mc.future{opacity:.62;}

.mc-hdr{
  padding:3px 8px;background:var(--card2);
  border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.mc-id{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:.04em;}
.mc-badge{font-size:9px;padding:1px 5px;border-radius:6px;font-weight:700;letter-spacing:.03em;}
.b-live{background:rgba(224,154,32,.14);color:var(--amber);}
.b-done{background:rgba(52,208,88,.12);color:var(--green);}
.b-future{background:var(--border);color:var(--muted);}

.mc-p{display:flex;align-items:center;gap:6px;padding:6px 8px;
  position:relative;transition:background var(--tr);}
.mc-p.win{background:var(--green-dim);}
.mc-p.lose{opacity:.33;}
.mc-av{width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:700;flex-shrink:0;text-transform:uppercase;}
.av1{background:#192240;color:var(--accent);}
.av2{background:#231830;color:var(--purple);}
.av-tbd{background:var(--border);color:var(--muted);}
.mc-name{flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mc-name.tbd{color:var(--muted);font-style:italic;font-size:10px;}
.mc-crown{font-size:10px;opacity:0;transition:opacity .15s;}
.mc-p.win .mc-crown{opacity:1;}
.mc-sep{height:1px;background:var(--border);margin:0 8px;}

/* CONNECTOR between rounds */
.b-con{flex-shrink:0;position:relative;align-self:stretch;}
.b-con svg{display:block;overflow:visible;}

/* EMPTY / LOADING */
.msg-center{display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;gap:10px;color:var(--muted);text-align:center;padding:32px;}
.msg-center .ico{font-size:36px;opacity:.2;}
.msg-center h3{font-size:14px;font-weight:500;color:var(--text);}

/* MOBILE OVERLAY */
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:190;
  opacity:0;transition:opacity var(--tr);pointer-events:none;}

@media(max-width:680px){
  :root{--sb:82vw;}
  .sidebar{position:fixed;top:var(--hdr);left:0;bottom:0;
    transform:translateX(-100%);opacity:1!important;
    transition:transform var(--tr);z-index:195;
    width:var(--sb)!important;min-width:var(--sb)!important;}
  .sidebar.mob-open{transform:translateX(0);}
  .sidebar.hidden{transform:translateX(-100%)!important;}
  .mob-overlay{display:block;}
  .mob-overlay.on{opacity:1;pointer-events:auto;}
  .mc{width:164px;}
  .hdr-sub{display:none;}
  .view-toggle{display:none;}
  .live-pill span{display:none;}
}
</style>
</head>
<body>

<div class="hdr">
  <button class="sb-btn" onclick="toggleSB()" title="Toggle sidebar">☰</button>
  <div class="hdr-logo">🏆</div>
  <div class="hdr-info">
    <div class="hdr-title" id="hdr-title">Loading…</div>
    <div class="hdr-sub" id="hdr-sub">Goldi Bot · Live Bracket</div>
  </div>
  <a class="hdr-back" href="index.html">← All</a>
</div>

<div class="mob-overlay" id="mob-ov" onclick="closeSB()"></div>

<div class="layout">
  <div class="sidebar" id="sidebar">

    <div class="sb-sec">
      <div class="sb-lbl">Tournament Info</div>
      <div class="info-rows" id="info-rows">
        <div class="info-row"><span class="ik">Status</span><span class="iv" id="i-status">—</span></div>
        <div class="info-row"><span class="ik">Format</span><span class="iv" id="i-format">—</span></div>
        <div class="info-row"><span class="ik">Type</span><span class="iv" id="i-type">—</span></div>
        <div class="info-row"><span class="ik">Server</span><span class="iv" id="i-server">—</span></div>
        <div class="info-row"><span class="ik">Players</span><span class="iv accent" id="i-players">—</span></div>
        <div class="info-row"><span class="ik">Matches</span><span class="iv" id="i-matches">—</span></div>
        <div class="info-row"><span class="ik">Remaining</span><span class="iv amber" id="i-remain">—</span></div>
        <div class="info-row"><span class="ik">Current Round</span><span class="iv gold" id="i-round">—</span></div>
      </div>
      <div class="prog-wrap">
        <div class="prog-label"><span>Progress</span><span id="prog-txt">0%</span></div>
        <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      </div>
    </div>

    <div class="sb-sec" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
      <div class="sb-lbl">Participants <span id="p-count" style="font-weight:400;color:var(--muted);text-transform:none;letter-spacing:0;"></span></div>
      <div class="p-list" id="p-list"></div>
    </div>

  </div>

  <div class="main">
    <div class="toolbar" id="toolbar" style="display:none;">
      <div class="tabs" id="tabs"></div>
      <div class="view-toggle" id="view-toggle">
        <button class="vtab active" id="vt-tree" onclick="setViewMode('tree')">Tree</button>
        <button class="vtab" id="vt-list" onclick="setViewMode('list')">List</button>
      </div>
      <div class="live-pill"><div class="dot"></div><span id="upd-time">Live</span></div>
      <button class="share-btn" onclick="copyLink()">🔗 Share</button>
    </div>

    <div id="champ-wrap"></div>

    <div class="bracket-canvas" id="canvas">
      <div class="msg-center" id="loading">
        <div class="ico">⏳</div>
        <h3>Loading bracket…</h3>
        <div>Fetching tournament data</div>
      </div>
    </div>
  </div>
</div>

<script>
const DATA_BASE = "https://goldi-calc.github.io/brackets/data";

// ── state
let D = null; // full data
let view = 'W'; // W | L | GF
let viewMode = 'tree'; // tree | list
let sbOpen = true;
let isMob = window.innerWidth <= 680;
const slug = new URLSearchParams(location.search).get('t');

window.addEventListener('resize', () => { isMob = window.innerWidth <= 680; });

// ── sidebar
function toggleSB() {
  if (isMob) {
    const sb = document.getElementById('sidebar');
    const ov = document.getElementById('mob-ov');
    const open = sb.classList.contains('mob-open');
    sb.classList.toggle('mob-open', !open);
    ov.classList.toggle('on', !open);
  } else {
    sbOpen = !sbOpen;
    document.getElementById('sidebar').classList.toggle('hidden', !sbOpen);
  }
}
function closeSB() {
  document.getElementById('sidebar').classList.remove('mob-open');
  document.getElementById('mob-ov').classList.remove('on');
}

// ── view mode
function setViewMode(m) {
  viewMode = m;
  document.getElementById('vt-tree').classList.toggle('active', m==='tree');
  document.getElementById('vt-list').classList.toggle('active', m==='list');
  renderBracket();
}

// ── load
async function load() {
  if (!slug) { showErr('No tournament specified','Use ?t=server_tourney'); return; }
  try {
    const r = await fetch(`${DATA_BASE}/tournament_${slug}.json?_=${Date.now()}`);
    if (!r.ok) throw 0;
    D = await r.json();
    render();
    document.getElementById('upd-time').textContent = 'Updated '+new Date().toLocaleTimeString();
  } catch {
    if (!D) showErr('Bracket not found', `No data found for "${slug}"`);
  }
}
function showErr(t,s){
  document.getElementById('loading').innerHTML=`<div class="ico">⚠️</div><h3>${esc(t)}</h3><div>${esc(s)}</div>`;
}

// ── main render
function render() {
  if (!D) return;
  const { participants=[], matches=[], tournament_type, tournament_name, server_name, status, current_round } = D;

  document.title = `${tournament_name||slug} · Goldi`;
  document.getElementById('hdr-title').textContent = tournament_name || slug;
  document.getElementById('hdr-sub').textContent = (server_name||'') + ' · Goldi Bot';

  const pMap = buildPMap(participants);
  const total = matches.length;
  const done  = matches.filter(m=>m.state==='complete').length;
  const pct   = total ? Math.round(done/total*100) : 0;
  const wOpen = matches.filter(m=>m.bracket==='W'&&m.state==='open').map(m=>m.round_id);
  const lOpen = matches.filter(m=>m.bracket==='L'&&m.state==='open').map(m=>m.round_id);
  const curR  = wOpen.length ? Math.min(...wOpen) : (lOpen.length ? Math.min(...lOpen) : '—');
  const hasL  = matches.some(m=>m.bracket==='L');
  const isDE  = tournament_type==='double elimination';

  // sidebar
  document.getElementById('i-status').textContent = status==='completed' ? '✓ Completed' : '⏳ Live';
  document.getElementById('i-status').className = 'iv '+(status==='completed'?'green':'amber');
  document.getElementById('i-format').textContent = isDE ? 'Double Elim' : 'Single Elim';
  document.getElementById('i-type').textContent = tournament_type || '—';
  document.getElementById('i-server').textContent = server_name || '—';
  document.getElementById('i-players').textContent = participants.length;
  document.getElementById('i-matches').textContent = `${done} / ${total}`;
  document.getElementById('i-remain').textContent = total - done;
  document.getElementById('i-round').textContent = curR;
  document.getElementById('prog-txt').textContent = pct+'%';
  document.getElementById('prog-fill').style.width = pct+'%';

  // participant bracket positions
  const pStatus = getParticipantStatus(matches, pMap);
  const champ = getChampion(matches, pMap);
  document.getElementById('p-count').textContent = `(${participants.length})`;
  document.getElementById('p-list').innerHTML = participants.map(p => {
    const st = pStatus[p.id] || {};
    const isChamp = champ && champ.id === p.id;
    const cls = isChamp ? 'champ' : st.eliminated ? 'elim' : 'alive';
    const tag = isChamp
      ? `<span class="p-tag champ">👑</span>`
      : st.eliminated
        ? `<span class="p-tag out">✗</span>`
        : st.bracket==='W'
          ? `<span class="p-tag w">W</span>`
          : st.bracket==='L'
            ? `<span class="p-tag l">L</span>`
            : '';
    const init = initials(p.display_name);
    return `<div class="p-row ${cls}">
      <div class="p-seed">${p.seed}</div>
      <div class="p-name" title="${esc(p.display_name)}">${esc(p.display_name)}</div>
      ${tag}
    </div>`;
  }).join('');

  // toolbar
  document.getElementById('toolbar').style.display = 'flex';
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = `
    <button class="tab ${view==='W'?'active':''}" onclick="switchView('W')">Winners</button>
    ${hasL ? `<button class="tab loser ${view==='L'?'active':''}" onclick="switchView('L')">Losers</button>` : ''}
    ${hasL ? `<button class="tab ${view==='GF'?'active':''}" onclick="switchView('GF')">Grand Final</button>` : ''}
  `;

  // champion banner
  const cw = document.getElementById('champ-wrap');
  if (status==='completed' && champ) {
    cw.innerHTML = `<div class="champ-banner">
      <div class="champ-crown">🏆</div>
      <div><div class="champ-lbl">Champion</div><div class="champ-name">${esc(champ.display_name)}</div></div>
    </div>`;
  } else { cw.innerHTML = ''; }

  renderBracket();
}

// ── bracket renderer
function renderBracket() {
  if (!D) return;
  const { matches=[], participants=[] } = D;
  const pMap = buildPMap(participants);
  const matchById = {};
  matches.forEach(m => { matchById[m.id] = m; });

  const canvas = document.getElementById('canvas');

  // get matches for current view
  let vm;
  if (view === 'GF') {
    const wm = matches.filter(m=>m.bracket==='W');
    if (!wm.length) { canvas.innerHTML = emptyMsg('No Grand Final yet'); return; }
    const maxR = Math.max(...wm.map(m=>m.round_id));
    vm = wm.filter(m=>m.round_id===maxR);
  } else {
    vm = matches.filter(m=>m.bracket===view);
  }

  if (!vm.length) { canvas.innerHTML = emptyMsg('No matches in this bracket'); return; }

  if (viewMode === 'list') {
    renderList(vm, pMap, matchById, canvas);
  } else {
    renderTree(vm, pMap, matchById, canvas);
  }
}

// ── TREE VIEW (Challonge-style)
function renderTree(vm, pMap, matchById, canvas) {
  const rounds = [...new Set(vm.map(m=>m.round_id))].sort((a,b)=>a-b);
  const byRound = {};
  rounds.forEach(r => { byRound[r] = vm.filter(m=>m.round_id===r); });

  const CARD_W = 200;
  const CARD_H = 74; // header(18) + player(28) + sep(1) + player(28) = ~75
  const CON_W  = 40; // connector column width
  const LABEL_H = 26;
  const isMobile = window.innerWidth <= 680;
  const cw = isMobile ? 164 : CARD_W;

  // Calculate per-round slot heights
  // In Challonge: Round N has 2^(N-1) spacing between match centers
  const R1 = byRound[rounds[0]].length;
  const baseSpacing = CARD_H + 16; // spacing between card centers in round 1

  // Build full HTML with absolutely positioned elements
  // We'll use a flex stage approach like Challonge

  let stageHTML = `<div class="b-stage">`;

  rounds.forEach((r, ri) => {
    const rMatches = byRound[r];
    // spacing multiplier: doubles each round
    const mult = Math.pow(2, ri);
    const slotH = baseSpacing * mult;
    const totalH = slotH * rMatches.length + (slotH - CARD_H) / 2;

    stageHTML += `<div class="b-round" style="width:${cw}px;">`;
    stageHTML += `<div class="b-round-lbl">${roundName(r, rounds.length, view)}</div>`;
    stageHTML += `<div class="b-slots" style="position:relative;height:${totalH}px;">`;

    rMatches.forEach((m, mi) => {
      const topOffset = mi * slotH + (slotH - CARD_H) / 2;
      stageHTML += `<div style="position:absolute;top:${topOffset}px;left:0;right:0;">`;
      stageHTML += buildMatchCard(m, pMap, matchById, cw);
      stageHTML += `</div>`;
    });

    stageHTML += `</div></div>`;

    // SVG connector to next round
    if (ri < rounds.length - 1) {
      const nextR = rounds[ri + 1];
      const nextMatches = byRound[nextR];
      const nextMult = mult * 2;
      const nextSlotH = baseSpacing * nextMult;
      const svgH = Math.max(totalH, nextSlotH * nextMatches.length + (nextSlotH-CARD_H)/2) + 40;

      let paths = '';
      // Each pair of current matches connects to one next match
      for (let i = 0; i < rMatches.length; i += 2) {
        const m1 = rMatches[i];
        const m2 = rMatches[i+1];
        const nextM = nextMatches[Math.floor(i/2)];
        if (!nextM) continue;

        const y1 = i * slotH + (slotH/2);
        const y2 = m2 ? ((i+1) * slotH + (slotH/2)) : y1;
        const yMid = (y1 + y2) / 2;
        const nextIdx = Math.floor(i/2);
        const yNext = nextIdx * nextSlotH + (nextSlotH/2);

        // Is the next match a winners or losers connection?
        const isWin = view === 'W';
        const lineColor = isWin ? 'var(--win-line)' : 'var(--lose-line)';
        const opacity = (m1.state==='complete' && (!m2||m2.state==='complete')) ? '0.7' : '0.35';

        // right side of m1
        paths += `<line x1="0" y1="${y1}" x2="${CON_W/2}" y2="${y1}"
          stroke="${lineColor}" stroke-width="1.5" opacity="${opacity}"/>`;
        // right side of m2
        if (m2) {
          paths += `<line x1="0" y1="${y2}" x2="${CON_W/2}" y2="${y2}"
            stroke="${lineColor}" stroke-width="1.5" opacity="${opacity}"/>`;
        }
        // vertical join
        paths += `<line x1="${CON_W/2}" y1="${y1}" x2="${CON_W/2}" y2="${y2}"
          stroke="${lineColor}" stroke-width="1.5" opacity="${opacity}"/>`;
        // to next match
        paths += `<line x1="${CON_W/2}" y1="${yMid}" x2="${CON_W}" y2="${yNext}"
          stroke="${lineColor}" stroke-width="1.5" opacity="${opacity}" stroke-dasharray="${m1.state!=='complete'||!m2||m2.state!=='complete'?'4,3':'none'}"/>`;
      }

      // Handle odd match (bye winner)
      if (rMatches.length % 2 === 1) {
        const lastM = rMatches[rMatches.length-1];
        const nextM = nextMatches[Math.floor((rMatches.length-1)/2)];
        if (nextM) {
          const y1 = (rMatches.length-1)*slotH + slotH/2;
          const yNext = Math.floor((rMatches.length-1)/2)*nextSlotH + nextSlotH/2;
          paths += `<line x1="0" y1="${y1}" x2="${CON_W}" y2="${yNext}"
            stroke="var(--win-line)" stroke-width="1.5" opacity="0.3" stroke-dasharray="3,3"/>`;
        }
      }

      stageHTML += `<div class="b-con" style="width:${CON_W}px;margin-top:${LABEL_H}px;">
        <svg width="${CON_W}" height="${svgH}" style="overflow:visible;">${paths}</svg>
      </div>`;
    }
  });

  stageHTML += `</div>`;
  canvas.innerHTML = stageHTML;
}

// ── LIST VIEW
function renderList(vm, pMap, matchById, canvas) {
  const rounds = [...new Set(vm.map(m=>m.round_id))].sort((a,b)=>a-b);
  let html = '';
  rounds.forEach(r => {
    const rm = vm.filter(m=>m.round_id===r);
    html += `<div style="margin-bottom:20px;">
      <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;
        letter-spacing:.09em;margin-bottom:10px;">${roundName(r,rounds.length,view)}</div>
      <div style="display:flex;flex-wrap:wrap;gap:10px;">`;
    rm.forEach(m => { html += buildMatchCard(m, pMap, matchById, 200); });
    html += `</div></div>`;
  });
  canvas.innerHTML = html;
}

// ── BUILD A SINGLE MATCH CARD
function buildMatchCard(m, pMap, matchById, cardW) {
  const p1 = pMap[m.player1_participant_id];
  const p2 = pMap[m.player2_participant_id];
  const isDone   = m.state === 'complete';
  const hasBoth  = p1 && p2;
  const isLive   = !isDone && hasBoth;
  const isFuture = !isDone && !hasBoth;

  const cls = isDone ? 'done' : isLive ? 'live' : 'future';
  const badge = isDone ? '<span class="mc-badge b-done">DONE</span>'
    : isLive  ? '<span class="mc-badge b-live">LIVE</span>'
    : '<span class="mc-badge b-future">UPCOMING</span>';

  const matchLabel = `${m.bracket==='L'?'L':'W'}${m.round_id}-M${m.match_order}`;

  return `<div class="mc ${cls}" style="width:${cardW}px;animation-delay:${Math.random()*.12}s">
    <div class="mc-hdr">
      <span class="mc-id">${matchLabel}</span>
      ${badge}
    </div>
    ${pRow(m, p1, 1, matchById, pMap)}
    <div class="mc-sep"></div>
    ${pRow(m, p2, 2, matchById, pMap)}
  </div>`;
}

function pRow(m, p, slot, matchById, pMap) {
  const isWin  = m.winner_participant_id && m.winner_participant_id===(p?p.id:null);
  const isLose = m.loser_participant_id  && m.loser_participant_id ===(p?p.id:null);
  const cls = isWin?'win':isLose?'lose':'';

  if (!p) {
    // Show "Winner of X" or "Loser of X" or TBD
    const prereqId = slot===1 ? m.player1_prereq_match_id : m.player2_prereq_match_id;
    let label = 'TBD';
    if (prereqId) {
      const feeder = matchById[prereqId];
      if (feeder) {
        // check if it's a loser link
        const isLoserSlot = feeder.next_match_lose_id === m.id;
        const prefix = isLoserSlot ? 'Loser of' : 'Winner of';
        const fp1 = pMap[feeder.player1_participant_id];
        const fp2 = pMap[feeder.player2_participant_id];
        if (fp1 && fp2) {
          label = `${prefix}: ${shorten(fp1.display_name)} vs ${shorten(fp2.display_name)}`;
        } else if (fp1 || fp2) {
          const name = shorten((fp1||fp2).display_name);
          label = `${prefix}: ${name}`;
        } else {
          label = `${prefix}: ${feeder.bracket}${feeder.round_id}-M${feeder.match_order}`;
        }
      }
    }
    return `<div class="mc-p">
      <div class="mc-av av-tbd">?</div>
      <div class="mc-name tbd">${esc(label)}</div>
    </div>`;
  }

  const init = initials(p.display_name);
  const avCls = slot===1 ? 'av1' : 'av2';
  return `<div class="mc-p ${cls}">
    <div class="mc-av ${avCls}">${init}</div>
    <div class="mc-name" title="${esc(p.display_name)}">${esc(p.display_name)}</div>
    <span class="mc-crown">👑</span>
  </div>`;
}

// ── VIEW SWITCH
function switchView(v) {
  view = v;
  document.querySelectorAll('.tab').forEach(t=>{
    const isGF = t.textContent.trim()==='Grand Final';
    const isL  = t.textContent.trim()==='Losers';
    const isW  = t.textContent.trim()==='Winners';
    t.classList.toggle('active',
      (v==='GF'&&isGF)||(v==='L'&&isL)||(v==='W'&&isW));
  });
  renderBracket();
}

// ── HELPERS
function buildPMap(participants) {
  const m = {};
  participants.forEach(p => { m[p.id] = p; });
  return m;
}

function getChampion(matches, pMap) {
  const wm = matches.filter(m=>m.bracket==='W');
  if (!wm.length) return null;
  const maxR = Math.max(...wm.map(m=>m.round_id));
  const gf = wm.filter(m=>m.round_id===maxR);
  if (!gf.length||!gf[0].winner_participant_id) return null;
  return pMap[gf[0].winner_participant_id]||null;
}

function getParticipantStatus(matches, pMap) {
  // returns {id: {bracket, eliminated}}
  const status = {};
  Object.keys(pMap).forEach(id => { status[id] = { bracket:'W', eliminated:false }; });
  matches.forEach(m => {
    if (m.state!=='complete') return;
    if (m.loser_participant_id) {
      const ls = status[m.loser_participant_id];
      if (ls) {
        if (m.next_match_lose_id) { ls.bracket='L'; }
        else { ls.eliminated=true; }
      }
    }
  });
  return status;
}

function roundName(r, total, v) {
  if (v==='GF') return 'Grand Final';
  if (v==='L') return `Losers · Round ${r}`;
  if (r===total && total>1) return 'Grand Final';
  if (r===total-1 && total>2) return 'Semi-Final';
  if (r===total-2 && total>3) return 'Quarter-Final';
  return `Round ${r}`;
}

function initials(name) {
  return (name||'?').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
}
function shorten(name) {
  if (!name||name.length<=13) return name;
  const p=name.split(' ');
  return p.length>1 ? p[0][0]+'. '+p[p.length-1] : name.slice(0,12)+'…';
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function emptyMsg(t){ return `<div class="msg-center"><div class="ico">📋</div><h3>${t}</h3></div>`; }
function copyLink(){
  navigator.clipboard.writeText(location.href).then(()=>{
    const b=document.querySelector('.share-btn');
    if(b){b.textContent='✓ Copied!';setTimeout(()=>b.textContent='🔗 Share',2000);}
  });
}

// ── INIT
load();
setInterval(load, 30000);
</script>
