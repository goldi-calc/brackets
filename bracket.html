<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goldi Bot · Bracket</title>
<style>
/* ── TOKENS ─────────────────────────────────────────────────────── */
:root {
  --bg:       #0b0e14;
  --surface:  #13171f;
  --card:     #1a1f2b;
  --card2:    #1f2535;
  --border:   #2a3040;
  --border2:  #343d52;
  --text:     #e8edf5;
  --muted:    #7a8599;
  --accent:   #5b8dee;
  --accent2:  #3d6fd4;
  --gold:     #f0c040;
  --gold-bg:  #2a2310;
  --green:    #3ecf6e;
  --green-bg: #0f2318;
  --red:      #f05555;
  --red-bg:   #260f0f;
  --amber:    #e0a030;
  --sidebar-w: 260px;
  --hdr: 54px;
  --r: 8px;
  --transition: 0.22s cubic-bezier(.4,0,.2,1);
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;overflow:hidden;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ── HEADER ── */
.hdr{
  position:fixed;top:0;left:0;right:0;height:var(--hdr);
  background:rgba(11,14,20,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;padding:0 16px;
  z-index:100;
}
.hdr-logo{
  width:32px;height:32px;border-radius:7px;flex-shrink:0;
  background:linear-gradient(135deg,#f0c040,#e07820);
  display:flex;align-items:center;justify-content:center;font-size:16px;
}
.hdr-title{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.hdr-sub{font-size:11px;color:var(--muted);}
.hdr-back{
  font-size:12px;color:var(--muted);text-decoration:none;
  padding:5px 10px;border-radius:6px;border:1px solid var(--border);
  transition:all var(--transition);white-space:nowrap;flex-shrink:0;
}
.hdr-back:hover{color:var(--text);border-color:var(--border2);}
.sidebar-toggle{
  width:32px;height:32px;border-radius:6px;border:1px solid var(--border);
  background:none;color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:16px;
  transition:all var(--transition);flex-shrink:0;
}
.sidebar-toggle:hover{color:var(--text);border-color:var(--border2);background:var(--card);}

/* ── LAYOUT ── */
.layout{
  display:flex;height:100vh;padding-top:var(--hdr);
}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:var(--surface);border-right:1px solid var(--border);
  overflow-y:auto;overflow-x:hidden;
  transition:width var(--transition),min-width var(--transition),opacity var(--transition),transform var(--transition);
  display:flex;flex-direction:column;
  position:relative;z-index:10;
}
.sidebar.collapsed{width:0;min-width:0;opacity:0;pointer-events:none;}

.sb-section{padding:16px 14px 8px;border-bottom:1px solid var(--border);}
.sb-section:last-child{border-bottom:none;}
.sb-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px;}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.stat-box{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:8px 10px;
}
.stat-box .val{font-size:18px;font-weight:700;line-height:1;}
.stat-box .lbl{font-size:10px;color:var(--muted);margin-top:3px;}
.stat-box.accent .val{color:var(--accent);}
.stat-box.green .val{color:var(--green);}
.stat-box.gold .val{color:var(--gold);}

.player-list{display:flex;flex-direction:column;gap:2px;}
.player-row{
  display:flex;align-items:center;gap:8px;
  padding:6px 8px;border-radius:6px;font-size:12px;
  transition:background var(--transition);
}
.player-row.alive{background:var(--card);}
.player-row.alive:hover{background:var(--card2);}
.player-row.eliminated{opacity:.32;}
.player-row.champion{background:var(--gold-bg);border:1px solid rgba(240,192,64,.25);}
.p-seed{
  width:18px;height:18px;border-radius:50%;
  background:var(--border);font-size:9px;color:var(--muted);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.p-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.p-icon{font-size:11px;flex-shrink:0;}

/* ── MAIN ── */
.main{
  flex:1;overflow:auto;display:flex;flex-direction:column;
  position:relative;
}

/* ── TOOLBAR ── */
.toolbar{
  position:sticky;top:0;z-index:20;
  background:rgba(11,14,20,.88);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.tabs{
  display:flex;gap:2px;background:var(--card);
  padding:3px;border-radius:7px;border:1px solid var(--border);
}
.tab{
  padding:5px 14px;border-radius:5px;font-size:12px;font-weight:500;
  cursor:pointer;border:none;background:none;color:var(--muted);
  transition:all var(--transition);font-family:inherit;
}
.tab.active{background:var(--accent);color:#fff;}
.tab:hover:not(.active){color:var(--text);}

.round-pills{display:flex;gap:4px;flex-wrap:wrap;flex:1;}
.rpill{
  padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;
  cursor:pointer;border:1px solid var(--border);
  background:none;color:var(--muted);font-family:inherit;
  transition:all var(--transition);
}
.rpill.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.rpill.done{border-color:var(--green-bg);color:var(--green);background:var(--green-bg);}
.rpill:hover:not(.active){color:var(--text);border-color:var(--border2);}

.live-badge{
  display:flex;align-items:center;gap:5px;
  font-size:11px;color:var(--muted);margin-left:auto;white-space:nowrap;
}
.live-dot{
  width:6px;height:6px;border-radius:50%;background:var(--green);
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.8);}}

.share-btn{
  background:none;border:1px solid var(--border);color:var(--muted);
  border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;
  font-family:inherit;transition:all var(--transition);
}
.share-btn:hover{color:var(--text);border-color:var(--border2);}

/* ── CHAMPION BANNER ── */
.champion-wrap{padding:20px 20px 0;}
.champion-banner{
  background:linear-gradient(135deg,rgba(240,192,64,.08),rgba(240,192,64,.02));
  border:1px solid rgba(240,192,64,.3);border-radius:12px;
  padding:20px 24px;display:flex;align-items:center;gap:16px;
  animation:fadeSlide .5s ease both;
}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.champion-crown{font-size:32px;}
.champion-label{font-size:10px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.1em;}
.champion-name{font-size:20px;font-weight:700;margin-top:3px;}

/* ── BRACKET TREE ── */
.bracket-scroll{flex:1;overflow:auto;padding:24px 16px 40px;}

.bracket-tree{
  display:flex;gap:0;align-items:flex-start;
  min-width:max-content;
}

.bracket-round{
  display:flex;flex-direction:column;
  min-width:200px;
  position:relative;
}
.bracket-round-label{
  font-size:10px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.08em;
  text-align:center;padding:0 12px 10px;
}

.bracket-matches{
  display:flex;flex-direction:column;
  gap:0;
  flex:1;
}

/* connector lines */
.bracket-slot{
  display:flex;align-items:center;
  position:relative;
  flex:1;
}
.bracket-slot::before{
  content:'';position:absolute;right:0;top:50%;
  width:20px;height:1px;background:var(--border2);
}
.bracket-slot:last-child::before{display:none;}

.connector-col{
  width:20px;flex-shrink:0;
  display:flex;flex-direction:column;
  position:relative;
}

/* ── MATCH CARD ── */
.match-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;
  width:190px;flex-shrink:0;
  transition:border-color var(--transition),box-shadow var(--transition);
  animation:cardIn .3s ease both;
}
@keyframes cardIn{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);}}
.match-card:hover{border-color:var(--border2);box-shadow:0 2px 16px rgba(0,0,0,.3);}
.match-card.complete{border-color:rgba(62,207,110,.2);}
.match-card.current-round{border-color:rgba(91,141,238,.4);}

.match-top{
  padding:3px 8px;background:var(--card2);
  border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.match-num{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:.04em;}
.match-badge{
  font-size:9px;padding:1px 5px;border-radius:8px;font-weight:600;
}
.badge-open{background:rgba(224,160,48,.15);color:var(--amber);}
.badge-done{background:rgba(62,207,110,.12);color:var(--green);}
.badge-bye{background:var(--border);color:var(--muted);}

.match-player{
  display:flex;align-items:center;gap:7px;
  padding:7px 8px;position:relative;
  transition:background var(--transition);
}
.match-player.winner{background:rgba(62,207,110,.07);}
.match-player.loser{opacity:.35;}

.mp-av{
  width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;flex-shrink:0;text-transform:uppercase;
}
.av-a{background:#1a2a45;color:var(--accent);}
.av-b{background:#2a1a3a;color:#a06cf0;}
.av-tbd{background:var(--border);color:var(--muted);}

.mp-name{
  flex:1;font-size:12px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;
}
.mp-name.tbd{color:var(--muted);font-style:italic;font-size:11px;}
.mp-crown{font-size:11px;opacity:0;transition:opacity .2s;}
.match-player.winner .mp-crown{opacity:1;}

.match-sep{height:1px;background:var(--border);margin:0 8px;}

/* ── VISUAL BRACKET CONNECTOR ── */
.bracket-row-group{
  display:flex;flex-direction:column;
  justify-content:space-around;
  flex:1;
}

.round-col{
  display:flex;flex-direction:column;
  align-items:center;
}

/* full bracket layout */
.bracket-stage{
  display:flex;align-items:stretch;
  gap:0;
}

.r-col{
  display:flex;flex-direction:column;
  align-items:flex-start;
}

.r-col-inner{
  display:flex;flex-direction:column;
  gap:0;
  height:100%;
}

/* ── CONNECTORS SVG ── */
.connector-svg{
  flex-shrink:0;
  align-self:stretch;
}

/* ── EMPTY / LOADING ── */
.center-msg{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;gap:12px;color:var(--muted);
  padding:40px;text-align:center;
}
.center-msg .icon{font-size:40px;opacity:.25;}
.center-msg h3{font-size:15px;font-weight:500;color:var(--text);}

/* ── MOBILE OVERLAY ── */
.sb-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.55);z-index:9;
  opacity:0;transition:opacity var(--transition);pointer-events:none;
}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  :root{--sidebar-w:80vw;}
  .sidebar{
    position:fixed;top:var(--hdr);left:0;bottom:0;
    transform:translateX(-100%);opacity:1;
    transition:transform var(--transition);
    z-index:50;width:var(--sidebar-w)!important;min-width:0!important;
  }
  .sidebar.mobile-open{transform:translateX(0);}
  .sidebar.collapsed{transform:translateX(-100%);opacity:1;pointer-events:auto;}
  .sb-overlay{display:block;}
  .sb-overlay.visible{opacity:1;pointer-events:auto;}
  .match-card{width:160px;}
  .bracket-round{min-width:170px;}
  .toolbar{padding:8px 12px;gap:6px;}
  .round-pills{display:none;}
  .hdr-sub{display:none;}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <button class="sidebar-toggle" id="sb-toggle" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
  <div class="hdr-logo">🏆</div>
  <div style="flex:1;min-width:0;">
    <div class="hdr-title" id="hdr-title">Loading…</div>
    <div class="hdr-sub" id="hdr-sub">Goldi Bot · Live Bracket</div>
  </div>
  <a class="hdr-back" href="index.html">← All</a>
</div>

<!-- SIDEBAR OVERLAY (mobile) -->
<div class="sb-overlay" id="sb-overlay" onclick="closeSidebar()"></div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sb-section">
      <div class="sb-label">Tournament</div>
      <div class="stat-grid">
        <div class="stat-box accent"><div class="val" id="s-players">—</div><div class="lbl">Players</div></div>
        <div class="stat-box green"><div class="val" id="s-done">—</div><div class="lbl">Done</div></div>
        <div class="stat-box"><div class="val" id="s-remain">—</div><div class="lbl">Remaining</div></div>
        <div class="stat-box gold"><div class="val" id="s-round">—</div><div class="lbl">Round</div></div>
      </div>
    </div>
    <div class="sb-section" style="flex:1;overflow-y:auto;">
      <div class="sb-label">Participants</div>
      <div class="player-list" id="player-list"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main">
    <div class="toolbar" id="toolbar" style="display:none;">
      <div class="tabs" id="bracket-tabs"></div>
      <div class="round-pills" id="round-pills"></div>
      <div class="live-badge"><div class="live-dot"></div><span id="updated-txt">Live</span></div>
      <button class="share-btn" onclick="copyLink()">🔗 Share</button>
    </div>

    <div id="champion-wrap"></div>

    <div class="bracket-scroll" id="bracket-scroll">
      <div class="center-msg" id="loading-msg">
        <div class="icon">⏳</div>
        <h3>Loading bracket…</h3>
        <div>Fetching tournament data</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const DATA_BASE = "https://goldi-calc.github.io/brackets/data";

// ── STATE ──────────────────────────────────────────────────────
let data = null;
let currentView = 'W';
let currentRound = 1;
let sidebarOpen = true;
let isMobile = window.innerWidth <= 700;

const slug = new URLSearchParams(location.search).get('t');

// ── SIDEBAR ─────────────────────────────────────────────────────
function toggleSidebar() {
  if (isMobile) {
    const sb = document.getElementById('sidebar');
    const ov = document.getElementById('sb-overlay');
    const open = sb.classList.contains('mobile-open');
    sb.classList.toggle('mobile-open', !open);
    ov.classList.toggle('visible', !open);
  } else {
    sidebarOpen = !sidebarOpen;
    document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
  }
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sb-overlay').classList.remove('visible');
}
window.addEventListener('resize', () => {
  isMobile = window.innerWidth <= 700;
});

// ── LOAD ────────────────────────────────────────────────────────
async function loadBracket() {
  if (!slug) {
    showError('No tournament specified', 'Use bracket.html?t=server_tourney');
    return;
  }
  try {
    const r = await fetch(`${DATA_BASE}/tournament_${slug}.json?_=${Date.now()}`);
    if (!r.ok) throw new Error();
    data = await r.json();
    render();
    document.getElementById('updated-txt').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch {
    if (!data) showError('Bracket not found', `No data for "${slug}"`);
  }
}

function showError(title, sub) {
  document.getElementById('loading-msg').innerHTML = `
    <div class="icon">⚠️</div>
    <h3>${esc(title)}</h3>
    <div>${esc(sub)}</div>`;
}

// ── RENDER ──────────────────────────────────────────────────────
function render() {
  if (!data) return;
  const { participants = [], matches = [], tournament_type, tournament_name, server_name, status } = data;

  // title
  document.title = `${tournament_name || slug} · Goldi`;
  document.getElementById('hdr-title').textContent = tournament_name || slug;
  document.getElementById('hdr-sub').textContent = (server_name || '') + ' · Goldi Bot';

  // sidebar stats
  const pMap = {};
  participants.forEach(p => { pMap[p.id] = p; });
  const total = matches.length;
  const done  = matches.filter(m => m.state === 'complete').length;
  const wOpen = matches.filter(m => m.bracket === 'W' && m.state === 'open').map(m => m.round_id);
  const lOpen = matches.filter(m => m.bracket === 'L' && m.state === 'open').map(m => m.round_id);
  const curR = wOpen.length ? Math.min(...wOpen) : (lOpen.length ? Math.min(...lOpen) : '—');

  document.getElementById('s-players').textContent = participants.length;
  document.getElementById('s-done').textContent = `${done}/${total}`;
  document.getElementById('s-remain').textContent = total - done;
  document.getElementById('s-round').textContent = curR;

  // sidebar players
  const champ = getChampion(matches, pMap);
  document.getElementById('player-list').innerHTML = participants.map(p => {
    const isChamp = champ && champ.id === p.id;
    const isOut   = p.eliminated;
    const cls     = isChamp ? 'champion' : (isOut ? 'eliminated' : 'alive');
    const init    = (p.display_name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    return `<div class="player-row ${cls}">
      <div class="p-seed">${p.seed}</div>
      <div class="p-name">${esc(p.display_name)}</div>
      ${isChamp ? '<span class="p-icon">👑</span>' : isOut ? '<span class="p-icon" style="color:var(--red);font-size:9px;">✗</span>' : ''}
    </div>`;
  }).join('');

  // toolbar
  document.getElementById('toolbar').style.display = 'flex';
  const hasL = matches.some(m => m.bracket === 'L');
  const tabsEl = document.getElementById('bracket-tabs');
  tabsEl.innerHTML = `
    <button class="tab ${currentView==='W'?'active':''}" onclick="switchView('W')">Winners</button>
    ${hasL ? `<button class="tab ${currentView==='L'?'active':''}" onclick="switchView('L')">Losers</button>` : ''}
    ${hasL ? `<button class="tab ${currentView==='GF'?'active':''}" onclick="switchView('GF')">Grand Final</button>` : ''}
  `;

  // round pills
  const viewMatches = getViewMatches();
  const rounds = [...new Set(viewMatches.map(m => m.round_id))].sort((a,b)=>a-b);
  if (!rounds.includes(currentRound)) currentRound = rounds[0] || 1;
  document.getElementById('round-pills').innerHTML = rounds.map(r => {
    const allDone = viewMatches.filter(m=>m.round_id===r).every(m=>m.state==='complete');
    const isCur   = r === currentRound;
    return `<button class="rpill ${isCur?'active':''} ${allDone&&!isCur?'done':''}" onclick="switchRound(${r})">${allDone&&!isCur?'✓ ':''}R${r}</button>`;
  }).join('');

  // champion
  const cw = document.getElementById('champion-wrap');
  if (status === 'completed' && champ) {
    cw.innerHTML = `<div class="champion-wrap"><div class="champion-banner">
      <div class="champion-crown">🏆</div>
      <div><div class="champion-label">Champion</div><div class="champion-name">${esc(champ.display_name)}</div></div>
    </div></div>`;
  } else { cw.innerHTML = ''; }

  // bracket
  renderBracket(matches, pMap);
}

function getViewMatches() {
  if (!data) return [];
  const { matches = [] } = data;
  if (currentView === 'GF') {
    const wm = matches.filter(m => m.bracket === 'W');
    if (!wm.length) return [];
    const maxR = Math.max(...wm.map(m => m.round_id));
    return wm.filter(m => m.round_id === maxR);
  }
  return matches.filter(m => m.bracket === currentView);
}

// ── BRACKET TREE RENDERER ────────────────────────────────────────
function renderBracket(matches, pMap) {
  const scroll = document.getElementById('bracket-scroll');
  const vm = getViewMatches();
  if (!vm.length) {
    scroll.innerHTML = `<div class="center-msg"><div class="icon">📋</div><h3>No matches here yet</h3></div>`;
    return;
  }

  const rounds = [...new Set(vm.map(m => m.round_id))].sort((a,b)=>a-b);
  const matchById = {};
  matches.forEach(m => { matchById[m.id] = m; });

  // Group matches by round
  const byRound = {};
  rounds.forEach(r => { byRound[r] = vm.filter(m => m.round_id === r); });

  // Build Challonge-style bracket tree
  // We render all rounds side-by-side with SVG connectors
  const CARD_H = 72; // match card height
  const CARD_W = 190;
  const CON_W  = 32; // connector width between rounds
  const V_GAP  = 12; // vertical gap between cards

  // Calculate spacing for each round (doubles each round)
  // Round 1: cards packed, Round 2: cards spread, etc.
  const numRounds = rounds.length;

  // For each round, calculate positions
  // Use the same algorithm as Challonge: space doubles each round
  const r1Count = byRound[rounds[0]].length;

  // Total height based on first round
  const totalSlots = nextPow2(r1Count) * 2; // generous
  const baseSlotH = CARD_H + V_GAP;

  // Build HTML
  let html = `<div class="bracket-stage" style="position:relative;">`;

  rounds.forEach((r, ri) => {
    const rmatches = byRound[r];
    const slotCount = Math.pow(2, ri); // slots double each round (for spacing)
    const slotH = baseSlotH * slotCount;
    const totalH = slotH * rmatches.length;

    html += `<div class="r-col" style="display:flex;flex-direction:column;align-items:flex-start;">`;

    // Round label
    html += `<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;
      letter-spacing:.08em;text-align:center;width:${CARD_W}px;padding-bottom:10px;">
      ${roundLabel(r, currentView, numRounds)}</div>`;

    // Matches
    rmatches.forEach((m, mi) => {
      const offsetTop = slotH * mi + (slotH - CARD_H) / 2;
      html += `<div style="position:relative;height:${slotH}px;display:flex;align-items:center;">`;
      html += matchCard(m, pMap, matchById, r === currentRound);
      html += `</div>`;
    });

    html += `</div>`;

    // SVG Connectors between this round and next
    if (ri < rounds.length - 1) {
      const nextR = rounds[ri + 1];
      const nextMatches = byRound[nextR];
      const nextSlotCount = slotCount * 2;
      const nextSlotH = baseSlotH * nextSlotCount;
      const svgH = Math.max(totalH, nextSlotH * nextMatches.length) + 100;

      html += `<svg class="connector-svg" width="${CON_W}" height="${svgH}"
        style="overflow:visible;flex-shrink:0;margin-top:24px;">`;

      // For each pair of current-round matches, draw lines to next match
      for (let i = 0; i < rmatches.length; i += 2) {
        const m1 = rmatches[i];
        const m2 = rmatches[i + 1];
        const nextMatch = nextMatches[Math.floor(i / 2)];
        if (!nextMatch) continue;

        const y1 = slotH * i + (slotH / 2) + 2;
        const y2 = m2 ? (slotH * (i + 1) + slotH / 2 + 2) : y1;
        const yMid = (y1 + y2) / 2;
        const nextSlotH2 = baseSlotH * nextSlotCount;
        const yNext = nextSlotH2 * Math.floor(i/2) + (nextSlotH2/2) + 2;

        html += `<path d="M0,${y1} H${CON_W/2} V${yMid} M0,${y2} H${CON_W/2} V${yMid} M${CON_W/2},${yMid} H${CON_W}"
          fill="none" stroke="var(--border2)" stroke-width="1.5" opacity=".7"/>`;
      }

      html += `</svg>`;
    }
  });

  html += `</div>`;
  scroll.innerHTML = html;
}

function matchCard(m, pMap, matchById, isCurrentRound) {
  const p1 = pMap[m.player1_participant_id];
  const p2 = pMap[m.player2_participant_id];
  const isDone = m.state === 'complete';
  const isBye  = !isDone && (!p1 || !p2) && !m.player1_prereq_match_id && !m.player2_prereq_match_id;
  const badge  = isDone ? 'done' : isBye ? 'bye' : 'open';
  const badgeTxt = isDone ? 'DONE' : isBye ? 'BYE' : 'LIVE';
  const cls = isDone ? 'complete' : (isCurrentRound ? 'current-round' : '');
  const delay = Math.random() * 0.15;

  return `<div class="match-card ${cls}" style="animation-delay:${delay}s">
    <div class="match-top">
      <span class="match-num">M${m.match_order}</span>
      <span class="match-badge badge-${badge}">${badgeTxt}</span>
    </div>
    ${playerRow(m, p1, 1, matchById, pMap)}
    <div class="match-sep"></div>
    ${playerRow(m, p2, 2, matchById, pMap)}
  </div>`;
}

function playerRow(m, p, slot, matchById, pMap) {
  const isWin = m.winner_participant_id && m.winner_participant_id === (p ? p.id : null);
  const isLose = m.loser_participant_id && m.loser_participant_id === (p ? p.id : null);
  const cls = isWin ? 'winner' : (isLose ? 'loser' : '');

  if (!p) {
    let lbl = 'TBD';
    const prereq = slot === 1 ? m.player1_prereq_match_id : m.player2_prereq_match_id;
    if (prereq) {
      const f = matchById[prereq];
      if (f && f.state !== 'complete') {
        const fp1 = pMap[f.player1_participant_id];
        const fp2 = pMap[f.player2_participant_id];
        if (fp1 && fp2) lbl = `${shorten(fp1.display_name)} / ${shorten(fp2.display_name)}`;
      }
    }
    return `<div class="match-player">
      <div class="mp-av av-tbd">?</div>
      <div class="mp-name tbd">${esc(lbl)}</div>
    </div>`;
  }

  const init = (p.display_name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const avCls = slot === 1 ? 'av-a' : 'av-b';
  return `<div class="match-player ${cls}">
    <div class="mp-av ${avCls}">${init}</div>
    <div class="mp-name">${esc(p.display_name)}</div>
    <span class="mp-crown">👑</span>
  </div>`;
}

function roundLabel(r, view, total) {
  if (view === 'GF') return 'Grand Final';
  if (view === 'L') return `Losers R${r}`;
  if (r === total && total > 1) return 'Final';
  if (r === total - 1 && total > 2) return 'Semi-Final';
  return `Round ${r}`;
}

function getChampion(matches, pMap) {
  const wm = matches.filter(m => m.bracket === 'W');
  if (!wm.length) return null;
  const maxR = Math.max(...wm.map(m => m.round_id));
  const gf = wm.filter(m => m.round_id === maxR);
  if (!gf.length || !gf[0].winner_participant_id) return null;
  return pMap[gf[0].winner_participant_id] || null;
}

// ── CONTROLS ────────────────────────────────────────────────────
function switchView(v) {
  currentView = v;
  if (data) render();
}
function switchRound(r) {
  currentRound = r;
  if (data) render();
}
function copyLink() {
  navigator.clipboard.writeText(location.href).then(() => {
    const b = document.querySelector('.share-btn');
    if (b) { b.textContent = '✓ Copied!'; setTimeout(() => b.textContent = '🔗 Share', 2000); }
  });
}

// ── UTILS ────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function shorten(n){ if(!n||n.length<=10)return n; const p=n.split(' '); return p.length>1?p[0][0]+'.'+p[p.length-1]:n.slice(0,9)+'…'; }
function nextPow2(n){ let p=1; while(p<n)p*=2; return p; }

// ── INIT ────────────────────────────────────────────────────────
loadBracket();
setInterval(loadBracket, 30000);
</script>
