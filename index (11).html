<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goldi Bot · Tournaments</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
  --border: #30363d; --text: #e6edf3; --muted: #8b949e;
  --accent: #388bfd; --accent-bg: #1f3250;
  --green: #3fb950; --green-bg: #1a2f1e;
  --amber: #d29922; --amber-bg: #2d2210;
  --red: #f85149; --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
a { color: inherit; text-decoration: none; }

.header {
  padding: 20px 32px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px;
}
.logo {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, #ffd700, #ff8c00);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.header h1 { font-size: 20px; font-weight: 600; }
.header p { font-size: 12px; color: var(--muted); margin-top: 2px; }

.container { max-width: 860px; margin: 0 auto; padding: 32px 24px; }

.section-title {
  font-size: 13px; font-weight: 600;
  color: var(--muted); text-transform: uppercase;
  letter-spacing: 0.08em; margin-bottom: 16px;
}

.tournament-grid { display: flex; flex-direction: column; gap: 10px; }

.tournament-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  display: flex; align-items: center; gap: 16px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.tournament-card:hover { border-color: var(--accent); background: var(--surface2); }

.tc-icon {
  width: 40px; height: 40px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
  background: var(--surface2); border: 1px solid var(--border);
}
.tc-info { flex: 1; min-width: 0; }
.tc-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tc-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }

.tc-badges { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.badge {
  font-size: 11px; font-weight: 500;
  padding: 3px 8px; border-radius: 12px;
}
.badge-ongoing { background: var(--amber-bg); color: var(--amber); }
.badge-completed { background: var(--green-bg); color: var(--green); }
.badge-type { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

.empty {
  text-align: center; padding: 60px 20px; color: var(--muted);
}
.empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
.empty h3 { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
.empty p { font-size: 13px; }

.loading { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
.dot-pulse::after { content: '...'; animation: dots 1.2s infinite; }
@keyframes dots { 0%,20%{content:'.'} 40%{content:'..'} 60%,100%{content:'...'} }

.refresh-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; font-size: 12px; color: var(--muted);
}
.refresh-btn {
  background: none; border: 1px solid var(--border);
  color: var(--muted); border-radius: 6px;
  padding: 4px 10px; font-size: 11px; cursor: pointer;
  font-family: inherit; transition: all 0.15s;
}
.refresh-btn:hover { color: var(--text); border-color: var(--muted); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🏆</div>
  <div>
    <h1>Goldi Bot Tournaments</h1>
    <p>Live bracket tracker · updates automatically</p>
  </div>
</div>

<div class="container">
  <div class="refresh-bar">
    <span id="last-updated">Loading...</span>
    <button class="refresh-btn" onclick="loadIndex()">↻ Refresh</button>
  </div>
  <div class="section-title">Active &amp; Recent Tournaments</div>
  <div id="tournament-list" class="tournament-grid">
    <div class="loading">Loading tournaments<span class="dot-pulse"></span></div>
  </div>
</div>

<script>
// ── CONFIG: set this to your GitHub Pages raw data URL ──
const DATA_BASE = "https://YOUR_USERNAME.github.io/YOUR_PAGES_REPO/data";
// e.g. "https://best1111.github.io/goldi-site/data"

function typeLabel(t) {
  return t === 'double elimination' ? 'Double Elim' : 'Single Elim';
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

async function loadIndex() {
  try {
    const r = await fetch(`${DATA_BASE}/index.json?_=${Date.now()}`);
    if (!r.ok) throw new Error('Not found');
    const data = await r.json();
    renderList(data.tournaments || []);
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('tournament-list').innerHTML = `
      <div class="empty">
        <div class="empty-icon">📋</div>
        <h3>No tournaments yet</h3>
        <p>Create a bracket with the bot and it'll appear here.</p>
      </div>`;
    document.getElementById('last-updated').textContent = 'Could not load data';
  }
}

function renderList(tournaments) {
  const list = document.getElementById('tournament-list');
  if (!tournaments.length) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🏆</div>
        <h3>No tournaments yet</h3>
        <p>Create a bracket with the bot and it'll appear here.</p>
      </div>`;
    return;
  }
  list.innerHTML = tournaments.map(t => `
    <div class="tournament-card" onclick="window.location='bracket.html?t=${encodeURIComponent(t.slug)}'">
      <div class="tc-icon">${t.status === 'completed' ? '🥇' : '⚔️'}</div>
      <div class="tc-info">
        <div class="tc-name">${esc(t.name || t.slug)}</div>
        <div class="tc-meta">${esc(t.server_name || '')} · ${t.player_count || '?'} players · ${timeAgo(t.updated_at)}</div>
      </div>
      <div class="tc-badges">
        <span class="badge badge-type">${typeLabel(t.tournament_type)}</span>
        <span class="badge ${t.status === 'completed' ? 'badge-completed' : 'badge-ongoing'}">${t.status === 'completed' ? '✓ Done' : '⏳ Live'}</span>
      </div>
    </div>
  `).join('');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadIndex();
setInterval(loadIndex, 30000);
</script>
</body>
</html>
