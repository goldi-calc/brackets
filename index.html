<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goldi Bot · Tournaments</title>
<style>
:root{
  --bg:#0b0e14;--surface:#13171f;--card:#1a1f2b;--card2:#1f2535;
  --border:#2a3040;--border2:#343d52;--text:#e8edf5;--muted:#7a8599;
  --accent:#5b8dee;--gold:#f0c040;--green:#3ecf6e;--green-bg:#0f2318;
  --amber:#e0a030;--amber-bg:#2a1e08;--red:#f05555;--r:10px;
  --transition:.2s cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh;}
a{color:inherit;text-decoration:none;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

.hdr{
  position:sticky;top:0;background:rgba(11,14,20,.92);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
  padding:16px 24px;display:flex;align-items:center;gap:14px;z-index:10;
}
.logo{
  width:38px;height:38px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,#f0c040,#e07820);
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.hdr h1{font-size:17px;font-weight:600;}
.hdr p{font-size:11px;color:var(--muted);margin-top:1px;}
.refresh-btn{
  margin-left:auto;background:none;border:1px solid var(--border);
  color:var(--muted);border-radius:7px;padding:5px 12px;
  font-size:11px;cursor:pointer;font-family:inherit;
  transition:all var(--transition);
}
.refresh-btn:hover{color:var(--text);border-color:var(--border2);}

.container{max-width:780px;margin:0 auto;padding:28px 20px 60px;}

.section-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);}
.updated{font-size:11px;color:var(--muted);}

.grid{display:flex;flex-direction:column;gap:8px;}

.t-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 18px;display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:border-color var(--transition),background var(--transition),transform var(--transition);
  animation:cardIn .3s ease both;
}
.t-card:hover{border-color:var(--accent);background:var(--card2);transform:translateX(2px);}
@keyframes cardIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.t-icon{
  width:40px;height:40px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  background:var(--card2);border:1px solid var(--border);
}
.t-info{flex:1;min-width:0;}
.t-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-meta{font-size:11px;color:var(--muted);margin-top:3px;}

.t-badges{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
.badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:10px;}
.badge-live{background:rgba(224,160,48,.15);color:var(--amber);}
.badge-done{background:var(--green-bg);color:var(--green);}
.badge-type{background:var(--border);color:var(--muted);}

.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty .eicon{font-size:40px;opacity:.2;margin-bottom:12px;}
.empty h3{font-size:15px;color:var(--text);margin-bottom:6px;}

@media(max-width:560px){
  .hdr{padding:12px 16px;}
  .container{padding:20px 14px 40px;}
  .t-badges{display:none;}
  .t-card{padding:12px 14px;}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">🏆</div>
  <div>
    <h1>Goldi Bot Tournaments</h1>
    <p>Live bracket tracker</p>
  </div>
  <button class="refresh-btn" onclick="loadIndex()">↻ Refresh</button>
</div>

<div class="container">
  <div class="section-head">
    <div class="section-label">Tournaments</div>
    <div class="updated" id="updated">Loading…</div>
  </div>
  <div class="grid" id="grid">
    <div class="empty"><div class="eicon">⏳</div><h3>Loading tournaments…</h3></div>
  </div>
</div>

<script>
const DATA_BASE = "https://goldi-calc.github.io/brackets/data";

function timeAgo(iso) {
  const d = Date.now() - new Date(iso).getTime();
  const m = Math.floor(d/60000);
  if(m<1)return'just now';if(m<60)return m+'m ago';
  const h=Math.floor(m/60);if(h<24)return h+'h ago';
  return Math.floor(h/24)+'d ago';
}
function typeShort(t){ return t==='double elimination'?'DE':'SE'; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function loadIndex() {
  try {
    const r = await fetch(`${DATA_BASE}/index.json?_=${Date.now()}`);
    if(!r.ok) throw 0;
    const d = await r.json();
    render(d.tournaments||[]);
    document.getElementById('updated').textContent = 'Updated '+new Date().toLocaleTimeString();
  } catch {
    document.getElementById('grid').innerHTML = `<div class="empty">
      <div class="eicon">📋</div>
      <h3>No tournaments yet</h3>
      <div>Create a bracket with the bot and it'll appear here.</div>
    </div>`;
    document.getElementById('updated').textContent = 'Could not load';
  }
}

function render(tournaments) {
  const g = document.getElementById('grid');
  if(!tournaments.length){
    g.innerHTML=`<div class="empty"><div class="eicon">🏆</div><h3>No tournaments yet</h3><div>Use the bot to create one.</div></div>`;
    return;
  }
  g.innerHTML = tournaments.map((t,i) => `
    <div class="t-card" style="animation-delay:${i*0.04}s"
      onclick="location.href='bracket.html?t=${encodeURIComponent(t.slug)}'">
      <div class="t-icon">${t.status==='completed'?'🥇':'⚔️'}</div>
      <div class="t-info">
        <div class="t-name">${esc(t.name||t.slug)}</div>
        <div class="t-meta">${esc(t.server_name||'')} · ${t.player_count||'?'} players · ${timeAgo(t.updated_at)}</div>
      </div>
      <div class="t-badges">
        <span class="badge badge-type">${typeShort(t.tournament_type)}</span>
        <span class="badge ${t.status==='completed'?'badge-done':'badge-live'}">${t.status==='completed'?'✓ Done':'● Live'}</span>
      </div>
    </div>
  `).join('');
}

loadIndex();
setInterval(loadIndex,30000);
</script>
</body>
</html>
