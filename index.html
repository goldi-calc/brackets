<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goldi Bot · Tournaments</title>
<style>
:root{
  --bg:#0b0e14;--surface:#13171f;--card:#1a1f2b;--card2:#1f2535;
  --border:#2a3040;--border2:#343d52;--text:#e8edf5;--muted:#7a8599;
  --accent:#5b8dee;--gold:#f0c040;--green:#3ecf6e;--green-bg:#0f2318;
  --amber:#e0a030;--amber-bg:#2a1e08;--red:#f05555;--r:10px;
  --transition:.2s cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh;}
a{color:inherit;text-decoration:none;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

.hdr{
  position:sticky;top:0;background:rgba(11,14,20,.92);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
  padding:16px 24px;display:flex;align-items:center;gap:14px;z-index:10;
}
.logo{
  width:38px;height:38px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,#f0c040,#e07820);
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.hdr h1{font-size:17px;font-weight:600;}
.hdr p{font-size:11px;color:var(--muted);margin-top:1px;}
.refresh-btn{
  margin-left:auto;background:none;border:1px solid var(--border);
  color:var(--muted);border-radius:7px;padding:5px 12px;
  font-size:11px;cursor:pointer;font-family:inherit;
  transition:all var(--transition);
}
.refresh-btn:hover{color:var(--text);border-color:var(--border2);}

.container{max-width:780px;margin:0 auto;padding:28px 20px 60px;}

.section-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);}
.updated{font-size:11px;color:var(--muted);}

.grid{display:flex;flex-direction:column;gap:8px;}

.t-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 18px;display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:border-color var(--transition),background var(--transition),transform var(--transition);
  animation:cardIn .3s ease both;
}
.t-card:hover{border-color:var(--accent);background:var(--card2);transform:translateX(2px);}
@keyframes cardIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.t-icon{
  width:40px;height:40px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  background:var(--card2);border:1px solid var(--border);
}
.t-info{flex:1;min-width:0;}
.t-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-meta{font-size:11px;color:var(--muted);margin-top:3px;}

.t-badges{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
.badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:10px;}
.badge-live{background:rgba(224,160,48,.15);color:var(--amber);}
.badge-done{background:var(--green-bg);color:var(--green);}
.badge-type{background:var(--border);color:var(--muted);}

.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty .eicon{font-size:40px;opacity:.2;margin-bottom:12px;}
.empty h3{font-size:15px;color:var(--text);margin-bottom:6px;}

@media(max-width:560px){
  .hdr{padding:12px 16px;}
  .container{padding:20px 14px 40px;}
  .t-badges{display:none;}
  .t-card{padding:12px 14px;}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">🏆</div>
  <div>
    <h1>Goldi Bot Tournaments</h1>
    <p>Live bracket tracker</p>
  </div>
  <div id="auth-box" style="margin-left:auto;display:flex;align-items:center;gap:8px;"></div>
  <button class="refresh-btn" onclick="loadIndex()">↻ Refresh</button>
</div>

<div class="container">
  <div id="my-brackets-section" style="display:none;margin-bottom:28px;">
    <div class="section-head">
      <div class="section-label">My Brackets</div>
    </div>
    <div class="grid" id="my-grid"></div>
  </div>

  <div class="section-head">
    <div class="section-label">All Tournaments</div>
    <div class="updated" id="updated">Loading…</div>
  </div>
  <div class="grid" id="grid">
    <div class="empty"><div class="eicon">⏳</div><h3>Loading tournaments…</h3></div>
  </div>
</div>

<script src="auth.js"></script>
<script>
const DATA_BASE = "https://goldi-calc.github.io/brackets/data";

// ── AUTH UI ──────────────────────────────────────────────────
function renderAuthBox() {
  const box = document.getElementById('auth-box');
  if (GoldiAuth.isLoggedIn()) {
    const user = GoldiAuth.getUser();
    const avatar = GoldiAuth.avatarUrl(user);
    box.innerHTML = `
      <img src="${avatar}" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--border);">
      <span style="font-size:12px;color:var(--text);">${esc(user.username)}</span>
      <button class="refresh-btn" onclick="GoldiAuth.logout();location.reload();" style="margin-left:0;">Logout</button>
    `;
  } else {
    box.innerHTML = `<button class="refresh-btn" onclick="doLogin()" style="margin-left:0;display:flex;align-items:center;gap:6px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.79 19.79 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.076.076 0 0 0-.04.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
      Login with Discord
    </button>`;
  }
}

function doLogin() {
  sessionStorage.setItem('goldi_return_to', 'index.html');
  GoldiAuth.login();
}

function timeAgo(iso) {
  const d = Date.now() - new Date(iso).getTime();
  const m = Math.floor(d/60000);
  if(m<1)return'just now';if(m<60)return m+'m ago';
  const h=Math.floor(m/60);if(h<24)return h+'h ago';
  return Math.floor(h/24)+'d ago';
}
function typeShort(t){ return t==='double elimination'?'DE':'SE'; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function loadIndex() {
  renderAuthBox();
  try {
    const r = await fetch(`${DATA_BASE}/index.json?_=${Date.now()}`);
    if(!r.ok) throw 0;
    const d = await r.json();
    render(d.tournaments||[]);
    document.getElementById('updated').textContent = 'Updated '+new Date().toLocaleTimeString();
    if (GoldiAuth.isLoggedIn()) {
      await loadMyBrackets(d.tournaments||[]);
    } else {
      document.getElementById('my-brackets-section').style.display = 'none';
    }
  } catch {
    document.getElementById('grid').innerHTML = `<div class="empty">
      <div class="eicon">📋</div>
      <h3>No tournaments yet</h3>
      <div>Create a bracket with the bot and it'll appear here.</div>
    </div>`;
    document.getElementById('updated').textContent = 'Could not load';
  }
}

// ── MY BRACKETS — checks if logged-in Discord user appears as a
// participant (external_id match) in any tournament's full data ──
async function loadMyBrackets(tournaments) {
  const user = GoldiAuth.getUser();
  if (!user) return;
  const sec = document.getElementById('my-brackets-section');
  const grid = document.getElementById('my-grid');
  grid.innerHTML = `<div class="empty" style="padding:24px;"><div class="eicon">⏳</div><h3>Checking your brackets…</h3></div>`;
  sec.style.display = 'block';

  const mine = [];
  // Only check the most recent ~20 to keep requests reasonable
  const toCheck = tournaments.slice(0, 20);
  await Promise.all(toCheck.map(async (t) => {
    try {
      const r = await fetch(`${DATA_BASE}/tournament_${t.slug}.json?_=${Date.now()}`);
      if (!r.ok) return;
      const full = await r.json();
      const isIn = (full.participants||[]).some(p => String(p.external_id) === String(user.id));
      if (isIn) mine.push(t);
    } catch {}
  }));

  if (!mine.length) {
    grid.innerHTML = `<div class="empty" style="padding:24px;">
      <div class="eicon">🔍</div>
      <h3>You're not registered in any active brackets</h3>
      <div>Use <code>/register</code> in Discord to join a tournament.</div>
    </div>`;
    return;
  }

  grid.innerHTML = mine.map((t,i) => `
    <div class="t-card" style="animation-delay:${i*0.04}s;border-color:rgba(79,126,240,.3);"
      onclick="location.href='bracket.html?t=${encodeURIComponent(t.slug)}'">
      <div class="t-icon" style="background:rgba(79,126,240,.12);border-color:rgba(79,126,240,.3);">⚔️</div>
      <div class="t-info">
        <div class="t-name">${esc(t.name||t.slug)}</div>
        <div class="t-meta">${esc(t.server_name||'')} · ${t.player_count||'?'} players · ${timeAgo(t.updated_at)}</div>
      </div>
      <div class="t-badges">
        <span class="badge badge-type">${typeShort(t.tournament_type)}</span>
        <span class="badge ${t.status==='completed'?'badge-done':'badge-live'}">${t.status==='completed'?'✓ Done':'● Live'}</span>
      </div>
    </div>
  `).join('');
}

function render(tournaments) {
  const g = document.getElementById('grid');
  if(!tournaments.length){
    g.innerHTML=`<div class="empty"><div class="eicon">🏆</div><h3>No tournaments yet</h3><div>Use the bot to create one.</div></div>`;
    return;
  }
  g.innerHTML = tournaments.map((t,i) => `
    <div class="t-card" style="animation-delay:${i*0.04}s"
      onclick="location.href='bracket.html?t=${encodeURIComponent(t.slug)}'">
      <div class="t-icon">${t.status==='completed'?'🥇':'⚔️'}</div>
      <div class="t-info">
        <div class="t-name">${esc(t.name||t.slug)}</div>
        <div class="t-meta">${esc(t.server_name||'')} · ${t.player_count||'?'} players · ${timeAgo(t.updated_at)}</div>
      </div>
      <div class="t-badges">
        <span class="badge badge-type">${typeShort(t.tournament_type)}</span>
        <span class="badge ${t.status==='completed'?'badge-done':'badge-live'}">${t.status==='completed'?'✓ Done':'● Live'}</span>
      </div>
    </div>
  `).join('');
}

loadIndex();
setInterval(loadIndex,30000);
</script>
</body>
</html>
